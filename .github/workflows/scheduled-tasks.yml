name: Scheduled Tasks

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  refresh-feeds:
    name: Refresh feed sources
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Trigger PHP feed refresh endpoint
        uses: ./.github/actions/curl-cron
        with:
          base-url: ${{ secrets.PUBLIC_SITE_URL }}
          path: /api/cron/refresh-feeds
          cron-secret: ${{ secrets.CRON_SECRET }}

  publish-posts:
    name: Publish scheduled posts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Trigger PHP publish endpoint
        uses: ./.github/actions/curl-cron
        with:
          base-url: ${{ secrets.PUBLIC_SITE_URL }}
          path: /api/cron/publish-posts
          cron-secret: ${{ secrets.CRON_SECRET }}
